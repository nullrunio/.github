<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" role="img"
     aria-label="NullRun — real-time AI agent enforcement gateway">
  <title>NullRun — real-time AI agent enforcement gateway</title>
  <desc>Banner for the nullrunio GitHub organization. Left: headline, subhead, install command. Right: circuit breaker graphic with NR monogram. Top bar carries live status; bottom strip carries the positioning line and URL.</desc>

  <defs>
    <pattern id="dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.7" fill="#1E293B"/>
    </pattern>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0A0E1A"/>
      <stop offset="100%" stop-color="#070A12"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#0B1220"/>
    </linearGradient>
    <radialGradient id="ambient" cx="18%" cy="28%" r="55%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.10"/>
      <stop offset="60%" stop-color="#22D3EE" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <filter id="cyanGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="amberGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background layers -->
  <rect width="1280" height="640" fill="url(#bgGrad)"/>
  <rect width="1280" height="640" fill="url(#dots)" opacity="0.55"/>
  <rect width="1280" height="640" fill="url(#ambient)"/>

  <!-- Top bar -->
  <g font-family="ui-monospace, 'JetBrains Mono', 'SF Mono', Menlo, Consolas, monospace">
    <text x="80" y="58" font-size="13" font-weight="700" fill="#E5E7EB" letter-spacing="3">NULLRUN</text>
    <line x1="165" y1="44" x2="165" y2="64" stroke="#1F2937" stroke-width="1"/>
    <text x="180" y="58" font-size="12" fill="#6B7280" letter-spacing="2">ENFORCEMENT · v0.6 · ALPHA</text>

    <g transform="translate(940, 47)">
      <circle cx="6" cy="6" r="4" fill="#22D3EE" filter="url(#cyanGlow)"/>
      <circle cx="6" cy="6" r="2.4" fill="#67E8F9"/>
      <text x="22" y="11" font-size="12" fill="#9CA3AF" letter-spacing="2">CONTROL PLANE</text>
      <text x="180" y="11" font-size="12" fill="#6B7280" letter-spacing="1">WS · LIVE</text>
    </g>
  </g>
  <line x1="80" y1="84" x2="1200" y2="84" stroke="#1F2937" stroke-width="1"/>

  <!-- Headline -->
  <g font-family="ui-monospace, 'JetBrains Mono', 'SF Mono', Menlo, Consolas, monospace"
     font-weight="700" font-size="72" letter-spacing="-1.5">
    <text x="80" y="186" fill="#9CA3AF">REAL-TIME.</text>
    <text x="80" y="266" fill="#22D3EE">PREVENTIVE.</text>
    <text x="80" y="346" fill="#9CA3AF">AGENT-NATIVE.</text>
  </g>

  <!-- Subhead + value pills -->
  <text x="80" y="404" font-family="ui-monospace, 'JetBrains Mono', monospace"
        font-size="22" fill="#E5E7EB" font-weight="500">Ship agents. Stay in control.</text>
  <text x="80" y="434" font-family="ui-monospace, 'JetBrains Mono', monospace"
        font-size="14" fill="#6B7280" letter-spacing="0.5">Hard budget caps · Real-time kill · Circuit breaker · Signed tools</text>

  <!-- Install command card -->
  <g transform="translate(80, 468)">
    <rect width="340" height="52" rx="8" fill="#0F172A" stroke="#1F2937" stroke-width="1.5"/>
    <text x="22" y="33" font-family="ui-monospace, 'JetBrains Mono', monospace"
          font-size="18" fill="#22D3EE">$</text>
    <text x="44" y="33" font-family="ui-monospace, 'JetBrains Mono', monospace"
          font-size="18" fill="#E5E7EB">pip install nullrun</text>
    <g transform="translate(298, 16)" stroke="#6B7280" stroke-width="1.5" fill="none" stroke-linecap="round">
      <rect x="0" y="0" width="14" height="14" rx="2"/>
      <path d="M 4 0 L 4 -4 L 18 -4 L 18 14 L 14 14"/>
    </g>
  </g>

  <!-- Circuit breaker card (right) -->
  <g transform="translate(870, 124)">
    <!-- Card frame -->
    <rect x="0" y="0" width="310" height="300" rx="16" fill="url(#cardGrad)" stroke="#1F2937" stroke-width="1.5"/>

    <!-- Corner brackets -->
    <g stroke="#22D3EE" stroke-width="2" fill="none" stroke-linecap="round">
      <path d="M 18 0 L 0 0 L 0 18"/>
      <path d="M 292 0 L 310 0 L 310 18"/>
      <path d="M 18 300 L 0 300 L 0 282"/>
      <path d="M 292 300 L 310 300 L 310 282"/>
    </g>

    <!-- Card label -->
    <text x="155" y="36" font-family="ui-monospace, 'JetBrains Mono', monospace"
          font-size="11" fill="#6B7280" letter-spacing="3" text-anchor="middle">[ CIRCUIT · BREAKER ]</text>
    <line x1="40" y1="52" x2="270" y2="52" stroke="#1F2937" stroke-width="1"/>

    <!-- Circuit trace -->
    <!-- Left wire -->
    <line x1="40" y1="148" x2="110" y2="148" stroke="#22D3EE" stroke-width="3" stroke-linecap="round"/>
    <!-- Left terminal -->
    <rect x="106" y="140" width="12" height="16" rx="1.5" fill="#0F172A" stroke="#22D3EE" stroke-width="1.5"/>
    <!-- Pivot -->
    <circle cx="118" cy="148" r="5.5" fill="#0F172A" stroke="#F59E0B" stroke-width="2"/>
    <!-- Lever (lifted, tripped) -->
    <line x1="118" y1="148" x2="184" y2="106" stroke="#F59E0B" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Lever handle -->
    <circle cx="184" cy="106" r="6" fill="#F59E0B" filter="url(#amberGlow)"/>
    <!-- Right terminal (disconnected) -->
    <rect x="190" y="156" width="12" height="16" rx="1.5" fill="#0F172A" stroke="#374151" stroke-width="1.5"/>
    <!-- Right wire (broken / dimmed) -->
    <line x1="202" y1="164" x2="270" y2="164" stroke="#374151" stroke-width="3"
          stroke-linecap="round" stroke-dasharray="6 4"/>

    <!-- Arc / spark in the gap -->
    <g stroke="#F59E0B" stroke-width="2" fill="none" stroke-linecap="round" filter="url(#amberGlow)">
      <path d="M 168 122 L 178 138 L 170 146 L 180 160"/>
    </g>

    <!-- Status row -->
    <g transform="translate(155, 218)" font-family="ui-monospace, 'JetBrains Mono', monospace">
      <circle cx="-72" cy="-4" r="4" fill="#F59E0B"/>
      <text x="-62" y="0" font-size="11" fill="#F59E0B" letter-spacing="2">TRIPPED</text>
      <text x="115" y="0" font-size="11" fill="#6B7280" letter-spacing="2" text-anchor="end">via @protect</text>
    </g>

    <!-- NR monogram -->
    <text x="155" y="274" font-family="ui-monospace, 'JetBrains Mono', monospace"
          font-weight="700" font-size="36" fill="#E5E7EB" text-anchor="middle" letter-spacing="-1">NR</text>
  </g>

  <!-- Bottom strip -->
  <line x1="80" y1="572" x2="1200" y2="572" stroke="#1F2937" stroke-width="1"/>
  <g font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" letter-spacing="2">
    <text x="80" y="606" fill="#6B7280">REAL-TIME AI AGENT ENFORCEMENT GATEWAY</text>
    <text x="1200" y="606" fill="#22D3EE" text-anchor="end">nullrun.io</text>
  </g>
</svg>
